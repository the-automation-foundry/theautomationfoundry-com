<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="14" fill="#F0EFEB"/>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="4.5" height="4.5" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="4.5" stroke="#4E6A78" stroke-width="2.6"/>
    </pattern>
    <clipPath id="clip">
      <circle cx="39" cy="50" r="24"/>
    </clipPath>
  </defs>
  <circle cx="61" cy="50" r="24" fill="url(#hatch)" clip-path="url(#clip)"/>
  <circle cx="39" cy="50" r="24" fill="none" stroke="#262B2E" stroke-width="3"/>
  <circle cx="61" cy="50" r="24" fill="none" stroke="#262B2E" stroke-width="3"/>
</svg>
